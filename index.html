<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Avengers Secure System</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron', sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("avengers.jpg") center/cover no-repeat;
overflow:hidden;
}

/* dark cinematic overlay */

body::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.9));
}

/* floating particles */

.particles span{
position:absolute;
width:4px;
height:4px;
background:red;
border-radius:50%;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh) scale(0);}
100%{transform:translateY(-10vh) scale(1);}
}

/* main panel */

.panel{
position:relative;
z-index:2;
backdrop-filter:blur(12px);
background:rgba(0,0,0,.55);
padding:50px;
border-radius:18px;
border:1px solid rgba(255,0,0,.4);
box-shadow:0 0 35px rgba(255,0,0,.7);
text-align:center;
width:360px;
animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

.title{
color:#ff2a2a;
font-size:28px;
letter-spacing:3px;
margin-bottom:15px;
}

.subtitle{
color:#aaa;
font-size:13px;
margin-bottom:25px;
}

/* glowing arc reactor */

.arc{
width:70px;
height:70px;
border-radius:50%;
margin:20px auto;
background:radial-gradient(circle,#ff0000,#4a0000);
box-shadow:0 0 20px red,0 0 50px red;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.15);}
100%{transform:scale(1);}
}

input{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:8px;
background:#111;
color:white;
font-size:15px;
outline:none;
border:1px solid #333;
}

input:focus{
border-color:red;
box-shadow:0 0 8px red;
}

/* button */

button{
width:100%;
padding:14px;
margin-top:18px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#ff0000,#8b0000);
color:white;
font-size:15px;
letter-spacing:1px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px red;
}

/* message */

#message{
display:none;
margin-top:25px;
font-size:20px;
color:#ff4040;
animation:glow 1.5s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 8px red;}
to{text-shadow:0 0 25px red;}
}

</style>
</head>

<body>

<div class="particles">
<span style="left:10%; animation-delay:1s"></span>
<span style="left:25%; animation-delay:4s"></span>
<span style="left:40%; animation-delay:2s"></span>
<span style="left:55%; animation-delay:5s"></span>
<span style="left:70%; animation-delay:3s"></span>
<span style="left:85%; animation-delay:6s"></span>
</div>

<div class="panel">

<div class="title">AVENGERS SYSTEM</div>
<div class="subtitle">AUTHORIZED ACCESS ONLY</div>

<div class="arc"></div>

<input type="password" id="pass" placeholder="Enter Password">

<button onclick="unlock()">UNLOCK SYSTEM</button>

<div id="message">
💎 Mind Stone Unlocked <br><br>
Next clue located in Robotics Lab
</div>

</div>

<script>

function unlock(){

var correct="mindstone";

var entered=document.getElementById("pass").value;

if(entered===correct){

document.getElementById("message").style.display="block";

}else{

alert("ACCESS DENIED");

}

}

</script>

</body>
</html>
